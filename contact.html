<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Vertex</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-content { max-width: 600px; margin: 4rem auto; padding: 3rem; background: rgba(18, 20, 24, 0.85); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-radius: 8px; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-family: var(--font-mono); color: var(--neon-cyan); margin-bottom: 0.5rem; font-size: 0.85rem; }
        input, textarea { width: 100%; padding: 1rem; background: #050506; border: 1px solid var(--border-color); color: var(--text-primary); font-family: var(--font-body); border-radius: 4px; }
        input:focus, textarea:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .submit-btn { width: 100%; background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 1rem; font-family: var(--font-mono); cursor: pointer; transition: all 0.3s; margin-top: 1rem; }
        .submit-btn:hover { background: var(--neon-cyan); color: var(--bg-deep); box-shadow: 0 0 15px rgba(0,240,255,0.4); }
    </style>
</head>
<body>
    <div class="bg-noise"></div><div class="bg-grid"></div>
    <nav class="navbar"><div class="nav-container"><a href="index.html" class="logo scramble-text">THE VERTEX</a></div></nav>

    <main class="container">
        <div class="page-content reveal">
            <span class="meta-tag">[SYS.UPLINK]</span>
            <h1 class="headline-xl scramble-text">Establish Connection</h1>
            <p class="excerpt">For press inquiries, sponsorships, or intelligence leaks, use the secure terminal below.</p>
            <br>
            <form>
                <div class="form-group">
                    <label>IDENTIFIER [NAME]</label>
                    <input type="text" placeholder="Enter name...">
                </div>
                <div class="form-group">
                    <label>ROUTING [EMAIL]</label>
                    <input type="email" placeholder="Enter email...">
                </div>
                <div class="form-group">
                    <label>PAYLOAD [MESSAGE]</label>
                    <textarea rows="5" placeholder="Enter message..."></textarea>
                </div>
                <button type="button" class="submit-btn">TRANSMIT_DATA</button>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
